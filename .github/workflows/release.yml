name: Build and Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Update plugin version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Update version in main plugin file
          sed -i "s/\* Version:.*/\* Version: $VERSION/" woo-vietnam-checkout.php
          # Update version in readme.txt
          sed -i "s/Stable tag:.*/Stable tag: $VERSION/" readme.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Prepare plugin directory
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          BUILD_DIR="woo-vietnam-checkout"

          # Create build directory
          mkdir -p dist/$BUILD_DIR

          # Copy main plugin files
          cp woo-vietnam-checkout.php dist/$BUILD_DIR/
          cp get-address.php dist/$BUILD_DIR/
          cp readme.txt dist/$BUILD_DIR/
          cp license.txt dist/$BUILD_DIR/

          # Copy directories
          cp -r includes dist/$BUILD_DIR/
          cp -r cities dist/$BUILD_DIR/
          cp -r i18n dist/$BUILD_DIR/
          cp -r languages dist/$BUILD_DIR/

          # Copy assets
          mkdir -p dist/$BUILD_DIR/assets
          cp -r assets/css dist/$BUILD_DIR/assets/

          # Copy compiled frontend dist
          if [ -d "assets/dist" ]; then
            cp -r assets/dist dist/$BUILD_DIR/assets/
          fi

          # Clean up unnecessary files
          find dist/$BUILD_DIR -name ".DS_Store" -delete
          find dist/$BUILD_DIR -name "*.log" -delete
          find dist/$BUILD_DIR -name ".git*" -delete
          find dist/$BUILD_DIR -name "node_modules" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cd dist
          zip -r "../woo-vietnam-checkout-${VERSION}.zip" woo-vietnam-checkout
          cd ..

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed in v${VERSION}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Features & Improvements" >> $GITHUB_OUTPUT
          echo "- Modern React-based address selector" >> $GITHUB_OUTPUT
          echo "- Improved checkout experience for Vietnamese customers" >> $GITHUB_OUTPUT
          echo "- Province/District/Ward selection integrated with WooCommerce" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "1. Download the \`woo-vietnam-checkout-${VERSION}.zip\` file" >> $GITHUB_OUTPUT
          echo "2. Go to WordPress Admin → Plugins → Add New → Upload Plugin" >> $GITHUB_OUTPUT
          echo "3. Upload the ZIP file and activate the plugin" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Requirements" >> $GITHUB_OUTPUT
          echo "- WordPress: 5.0 or higher" >> $GITHUB_OUTPUT
          echo "- WooCommerce: 8.0 or higher" >> $GITHUB_OUTPUT
          echo "- PHP: 7.4 or higher" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            woo-vietnam-checkout-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: woo-vietnam-checkout-${{ steps.get_version.outputs.VERSION }}
          path: woo-vietnam-checkout-${{ steps.get_version.outputs.VERSION }}.zip
          retention-days: 90
